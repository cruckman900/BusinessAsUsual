# ---------------------------------------------------------------------------
# EDGE nginx server block for api.businessasusual.work
#
# This runs on the EC2 HOST (not in Docker). It terminates TLS and forwards
# /api/* and /health to the compose "gateway" container listening on
# 127.0.0.1:8088. The gateway then path-routes to each microservice.
#
# Install:
#   sudo cp deploy/nginx/edge-api.businessasusual.work.conf \
#           /etc/nginx/sites-available/api.businessasusual.work
#   sudo ln -s /etc/nginx/sites-available/api.businessasusual.work \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (first time), issues + auto-configures the 443 block:
#   sudo certbot --nginx -d api.businessasusual.work
# ---------------------------------------------------------------------------

server {
	listen 80;
	server_name api.businessasusual.work;

	# certbot will add its own 443 server block and a redirect here after
	# `certbot --nginx`. Until then this HTTP block proves routing works.

	location / {
		proxy_pass         http://127.0.0.1:8088;
		proxy_http_version 1.1;
		proxy_set_header   Host              $host;
		proxy_set_header   X-Real-IP         $remote_addr;
		proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
		proxy_set_header   X-Forwarded-Proto $scheme;
	}
}
