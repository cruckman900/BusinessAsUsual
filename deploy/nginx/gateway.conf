# ---------------------------------------------------------------------------
# BusinessAsUsual API gateway (reverse proxy)
#
# One public entrypoint that path-routes to each microservice on the internal
# Docker network. Used for both ngrok validation and production behind
# https://api.businessasusual.work.
#
# Route map:
#   /api/hr/*       -> hr-api        (mobile UI contract: /api/hr/mobile/*)
#   /api/crm/*      -> crm-api       (mobile UI contract: /api/crm/mobile/*)
#   /api/modules/*  -> moduleregistry (discovery: /api/modules/mobile)
#   /health         -> moduleregistry (simple liveness)
# ---------------------------------------------------------------------------

upstream hr_api        { server hr-api:80; }
upstream crm_api       { server crm-api:80; }
upstream registry_api  { server moduleregistry:80; }

server {
	listen 80;
	server_name _;

	# Forward original host/scheme so services build correct absolute URLs.
	proxy_set_header Host              $host;
	proxy_set_header X-Real-IP         $remote_addr;
	proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;

	# --- HR module ---------------------------------------------------------
	location /api/hr/ {
		proxy_pass http://hr_api;
	}

	# --- CRM module --------------------------------------------------------
	location /api/crm/ {
		proxy_pass http://crm_api;
	}

	# --- Module Registry (discovery) --------------------------------------
	location /api/modules/ {
		proxy_pass http://registry_api;
	}

	# --- Health ------------------------------------------------------------
	location = /health {
		proxy_pass http://registry_api/health;
	}

	location = / {
		return 200 "BusinessAsUsual API gateway\n";
		add_header Content-Type text/plain;
	}
}
