name: Deploy BAU (Dockerized)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add EC2 to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Build the on-box .env on the runner (GitHub expands the secrets here), then
      # rsync it to the instance so docker compose picks it up. The web shell needs
      # to reach AI.Api and ModuleRegistry, which run on the LIGHT instance.
      # NOTE: use the LIGHT instance PRIVATE IP for these URLs — the security group
      # only allows the main SG as a source, which matches in-VPC (private) traffic.
      # LIGHT_EC2_HOST (public) is still used below for SSH/rsync from the runner.
      - name: Generate .env
        run: |
          cat > .env << ENV
          ASPNETCORE_ENVIRONMENT=Production
          AWS_SQL_CONNECTION_STRING=${{ secrets.AWS_SQL_CONNECTION_STRING }}
          AI_SERVICE_URL=http://${{ secrets.LIGHT_EC2_PRIVATE_IP }}:5300
          MODULE_REGISTRY_URL=http://${{ secrets.LIGHT_EC2_PRIVATE_IP }}:5100
          ENV

      - name: Sync repo to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./ \
            ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/BusinessAsUsual/

      # Copy the generated .env separately so rsync --delete never clobbers it.
      - name: Copy .env to EC2
        run: |
          scp -i ~/.ssh/id_rsa .env \
            ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/BusinessAsUsual/.env

      - name: Deploy on EC2
        run: |
          ssh ec2-user@${{ secrets.EC2_HOST }} -i ~/.ssh/id_rsa << 'EOF'
            cd /home/ec2-user/BusinessAsUsual
            docker-compose -f docker-compose.prod.yml down
            # Reclaim disk BEFORE building: the root volume fills up with dangling
            # images/layers and stale build cache over time, which surfaces as
            # `dotnet restore` exit code 82 ("no space left on device"). Prune
            # everything not tied to a running container.
            docker system prune -af
            docker builder prune -af
            df -h /
            docker-compose -f docker-compose.prod.yml up -d --build
          EOF