version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: frontend/BusinessAsUsual.Web/Dockerfile
    restart: unless-stopped
    networks:
      - BusinessAsUsual
    ports:
      - "3000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - API_URL=http://backend:80
      # Module Registry + AI run on the LIGHT instance - point at its private IP/DNS.
      # Provided via the on-box .env file (see .env.prod.example).
      - ModuleRegistry__Url=${MODULE_REGISTRY_URL}
      - AiService__Url=${AI_SERVICE_URL}
    depends_on:
      - backend
      - admin

  admin:
    build:
      context: .
      dockerfile: frontend/BusinessAsUsual.Admin/Dockerfile
    restart: unless-stopped
    networks:
      - BusinessAsUsual
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - API_URL=http://backend:80
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: .
      dockerfile: backend/BusinessAsUsual.API/Dockerfile
    restart: unless-stopped
    networks:
      - BusinessAsUsual
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # This value will come from the host environment / secrets at runtime
      - AWS_SQL_CONNECTION_STRING
    depends_on: []

  # Public API gateway (reverse proxy). The host edge nginx terminates TLS for
  # api.businessasusual.work and proxies to this container on 127.0.0.1:8088.
  # In the three-instance split the upstream services live on the HEAVY/LIGHT
  # instances, so gateway.conf is RENDERED at deploy time from a template with
  # their private IP:port (see deploy-docker.yml "Generate gateway.conf" step).
  gateway:
    image: nginx:1.28-alpine
    restart: unless-stopped
    networks:
      - BusinessAsUsual
    ports:
      # Loopback-only: only the host edge nginx reaches it.
      - "127.0.0.1:8088:80"
    volumes:
      - ./deploy/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  BusinessAsUsual:
    driver: bridge
